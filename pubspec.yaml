name: aran
description: "Aran – Women's Safety SOS App. Protection wall for every woman."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_database: ^11.3.6
  firebase_messaging: ^15.2.6

  # Location & Maps
  geolocator: ^14.0.0
  google_maps_flutter: ^2.12.1

  # Sensors & Detection
  sensors_plus: ^6.1.1

  # Notifications
  flutter_local_notifications: ^19.2.1

  # Communication
  url_launcher: ^6.3.1
  telephony: ^0.2.0

  # Storage & State
  shared_preferences: ^2.5.3
  provider: ^6.1.4

  # Permissions
  permission_handler: ^12.0.0+1

  # UI
  google_fonts: ^6.2.1
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/
  #   - assets/animations/
