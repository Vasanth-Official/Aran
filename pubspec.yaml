name: aran
description: "Aran – Women's Safety SOS App. Protection wall for every woman."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_database: any
  firebase_messaging: any

  # Location & Maps
  geolocator: any
  google_maps_flutter: any

  # Sensors & Detection
  sensors_plus: ^6.1.1

  # Notifications
  flutter_local_notifications: any

  # Communication
  url_launcher: ^6.3.1
  direct_sms: ^0.0.1

  # Storage & State
  shared_preferences: any
  provider: any

  permission_handler: any

  # UI
  google_fonts: ^6.2.1
  lottie: any
  audioplayers: ^5.1.0
  kiosk_mode: any
  flutter_background_service: ^5.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/
  #   - assets/animations/
