name: aran
description: "Aran – Women's Safety SOS App. Protection wall for every woman."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_database: any
  firebase_messaging: any

  # Location & Maps
  geolocator: ^13.0.1
  google_maps_flutter: ^2.10.0

  # Sensors & Detection
  sensors_plus: ^6.1.1

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Communication
  url_launcher: ^6.3.1
  direct_sms: ^0.0.1

  # Storage & State
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  provider: any

  permission_handler: any

  # UI
  google_fonts: ^6.2.1
  lottie: any
  audioplayers: ^5.2.1
  kiosk_mode: any
  flutter_background_service: ^5.0.10
  flutter_plugin_android_lifecycle: ^2.0.24

dependency_overrides:
  google_maps_flutter_android: ^2.19.5
  flutter_plugin_android_lifecycle: ^2.0.34
  path_provider_android: ^2.2.23
  shared_preferences_android: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/
  #   - assets/animations/
